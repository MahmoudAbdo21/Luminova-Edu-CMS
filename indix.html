<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminova-Edu CMS</title>

    <!-- Cache Busting Strategy -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">

    <!-- Tailwind CSS (CDN for zero-build static) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#06b6d4',
                            hover: '#0891b2',
                            dark: '#1e293b',
                            gold: '#fbbf24',
                        }
                    },
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <!-- React and ReactDOM -->
    <script src="./libs/react.development.js"></script>
    <script src="./libs/react-dom.development.js"></script>

    <!-- HTM (Hyperscript Tagged Markup) -->
    <script src="./libs/htm.umd.js"></script>

    <!-- Base Luminova Object -->
    <script>
        window.__LUMINOVA = {
            Pages: {},
            Components: {},
            Icons: {},
            Services: {},
            i18n: {
                ar: {
                    news: 'الأخبار والتحديثات',
                    years: 'السنوات الدراسية',
                    semesters: 'الترم الدراسي',
                    subjects: 'المواد الدراسية',
                    students: 'قاعدة الطلاب',
                    summaries: 'الملخصات والمذكرات',
                    quizzes: 'الاختبارات الإلكترونية',
                    certificates: 'الشهادات',
                    settings: 'الإعدادات',
                },
                en: {
                    news: 'News & Updates',
                    years: 'Academic Years',
                    semesters: 'Semesters',
                    subjects: 'Subjects',
                    students: 'Students Base',
                    summaries: 'Summaries & Notes',
                    quizzes: 'Online Quizzes',
                    certificates: 'Certificates',
                    settings: 'Settings',
                }
            }
        };
    </script>
</head>

<body class="antialiased min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200">
    <div id="cms-root"></div>
    <!-- Load the standalone CMS application logic -->
    <script src="./cms.js?v=2"></script>
</body>

</html>
